<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkle - Ana Sayfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #FFF0F5; /* Tatlı Lavanta Pembesi Arka Plan */
            color: #4A0E17; /* Mürdüm yazı rengi */
            font-family: Arial, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .main-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            border: 2px solid #FFB6C1;
            max-width: 450px;
            width: 100%;
        }
        .btn-pink {
            background-color: #FF69B4;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px;
            border-radius: 12px;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-pink:hover {
            background-color: #FF1493;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="main-card text-center">
        <h1 class="fw-bold mb-2" style="color: #4A0E17; font-size: 2.8rem;">⋆. 𐙚˚࿔ pinkle 𝜗𝜚˚⋆</h1>
        <p class="text-muted mb-4">Hoş geldin! Kaç harfli oynamak istersin?</p>
        
        <div class="d-grid gap-3">
            <a href="/wordle/4" class="btn btn-pink">𐙚 4 Harfli Mod</a>

            <a href="/wordle/6" class="btn btn-pink">˙⋆✮ 6 Harfli Mod</a>
        </div>
        
        <p class="mt-4 small text-muted" style="font-size: 0.8rem;">© 2026 pinkle | Rümeysa ETA °❀⋆.ೃ࿔*:･°❀⋆.ೃ࿔*:･</p>
    </div>

</body>
</html>
